<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战公基</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --card-bg: #111827;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --border: #1e293b;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        [data-theme="light"] {
            --bg: #f0f7ff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        [data-theme="skeu"] {
            --bg: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
            --text: #e8e8ff;
            --text-secondary: #8888aa;
            --accent: #7c4dff;
            --success: #00e676;
            --danger: #ff5252;
            --border: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* 流动光晕层 */
        [data-theme="skeu"] .glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="skeu"] .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            will-change: transform;
        }

        [data-theme="skeu"] .glow-red {
            width: 380px;
            height: 380px;
            top: -80px;
            left: -100px;
            background: radial-gradient(circle, rgba(255, 70, 80, 0.6), rgba(200, 30, 60, 0.1) 70%);
            animation: flowRed 4.5s infinite alternate ease-in-out;
        }

        [data-theme="skeu"] .glow-blue {
            width: 450px;
            height: 450px;
            bottom: -120px;
            right: -120px;
            background: radial-gradient(circle, rgba(50, 140, 255, 0.5), rgba(20, 60, 200, 0.05) 70%);
            animation: flowBlue 5.5s infinite alternate ease-in-out;
        }

        [data-theme="skeu"] .glow-purple {
            width: 200px;
            height: 200px;
            top: 40%;
            left: 50%;
            background: radial-gradient(circle, rgba(180, 100, 255, 0.25), transparent 70%);
            animation: flowPurple 6s infinite alternate ease-in-out;
        }

        @keyframes flowRed {
            0%   { transform: translate(0,0) scale(1); }
            25%  { transform: translate(120px,80px) scale(1.3); }
            50%  { transform: translate(30px,-100px) scale(0.85); }
            75%  { transform: translate(-80px,60px) scale(1.4); }
            100% { transform: translate(-40px,-30px) scale(1.1); }
        }
        @keyframes flowBlue {
            0%   { transform: translate(0,0) scale(1); }
            25%  { transform: translate(-100px,-90px) scale(1.3); }
            50%  { transform: translate(-40px,120px) scale(0.8); }
            75%  { transform: translate(110px,50px) scale(1.2); }
            100% { transform: translate(20px,-100px) scale(1.4); }
        }
        @keyframes flowPurple {
            0%   { transform: translate(-50%,0) scale(1) rotate(0deg); }
            33%  { transform: translate(-30%,-60px) scale(1.6) rotate(120deg); }
            66%  { transform: translate(-70%,50px) scale(0.7) rotate(240deg); }
            100% { transform: translate(-50%,-20px) scale(1.2) rotate(360deg); }
        }

        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        [data-theme="skeu"] #particles { display: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
        
        /* 首页 */
        .home-screen { text-align: center; padding-top: 60px; }
        .home-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
        .home-subtitle { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 40px; }
        .big-cards { display: flex; flex-direction: column; gap: 16px; margin-bottom: 30px; }
        .big-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .big-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
        .big-card-icon { font-size: 3rem; margin-bottom: 12px; }
        .big-card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
        .big-card-count { font-size: 0.875rem; color: var(--accent); }
        
        /* 统计浮窗 */
        .stats-float {
            position: fixed;
            bottom: 76px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            backdrop-filter: blur(20px);
            z-index: 100;
            box-shadow: var(--shadow);
            font-size: 0.75rem;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.625rem; color: var(--text-secondary); margin-top: 1px; }
        
        /* 换肤按钮 - Dock 风格 */
        .theme-switcher {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 4px 8px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .theme-btn {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .theme-btn:hover { transform: scale(1.2); }
        .theme-btn.active {
            border-color: transparent;
        }
        /* Dock 选中指示器：底部小圆点 */
        .theme-btn.active::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
        }
        .theme-btn[data-theme="default"] { background: linear-gradient(135deg, #0f172a, #1e293b); }
        .theme-btn[data-theme="light"] { background: linear-gradient(135deg, #f0f7ff, #e2e8f0); border: 2px solid #cbd5e1; }
        .theme-btn[data-theme="skeu"] { background: linear-gradient(135deg, #4a4a6e, #2a2a4e); border: 2px solid #7c4dff; }
        
        /* 页面通用 */
        .page { display: none; }
        .page.active { display: block; }
        .page-header {
            display: flex;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 16px;
        }
        .back-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 1.125rem;
        }
        .page-title { font-size: 1.125rem; font-weight: 700; }
        .page-subtitle { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        
        /* 学科网格 */
        .subject-grid { display: flex; flex-direction: column; gap: 12px; }
        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .subject-card:hover { border-color: var(--accent); }
        .subject-name { font-size: 1rem; font-weight: 600; text-align: center; }
        .subject-count { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; text-align: center; }
        
        /* 模式选择 */
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mode-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .mode-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .mode-icon { font-size: 2rem; margin-bottom: 8px; }
        .mode-name { font-size: 0.875rem; font-weight: 600; }
        .mode-desc { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; }
        
        /* 学习页面 */
        #page-study { padding-bottom: 120px; }
        .card-wrapper {
            position: relative;
            width: 100%;
            min-height: 300px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            min-height: 300px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            min-height: 300px;
            max-height: calc(100vh - 260px);
            overflow-y: auto;
            overflow-x: hidden;
            backface-visibility: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }
        .card-back { transform: rotateY(180deg); }
        
        .card-back {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card-question {
            font-size: 1.05rem;
            line-height: 1.8;
            padding-top: 32px;
        }
        .card-answer {
            font-size: 1rem;
            line-height: 1.8;
            margin: auto;
            padding: 0 4px 8px 4px;
            max-width: 100%;
        }
        .card-question::-webkit-scrollbar,
        .card-answer::-webkit-scrollbar { width: 4px; }
        .card-question::-webkit-scrollbar-thumb,
        .card-answer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .card-answer b, .card-answer strong { color: var(--accent); }
        .card-answer .analysis-section { 
            margin-top: 16px; 
            padding: 12px; 
            background: rgba(124, 77, 255, 0.08); 
            border-left: 3px solid rgba(124, 77, 255, 0.4); 
            border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; 
            color: var(--text);
        }
        [data-theme="light"] .card-answer .analysis-section {
            background: #f3e5f5;
            border-left-color: #7c4dff;
            color: #4a148c;
        }
        [data-theme="skeu"] .card-answer .analysis-section {
            background: rgba(124, 77, 255, 0.12);
            border-left-color: #7c4dff;
            color: #e1bee7;
        }
        .card-answer .analysis-section .section-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #7c4dff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .card-answer .analysis-section .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #7c4dff;
            color: white;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 500;
        }
        .card-answer .expansion-section { margin-top: 12px; padding-top: 10px; border-top: 1px dashed rgba(128,128,128,0.3); }
        .card-answer .section-label { font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; letter-spacing: 1px; }
        
        .card-number {
            position: absolute;
            top: 14px; right: 16px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.25);
            z-index: 2;
        }
        /* 左上角标签 - 基础样式 */
        .card-difficulty {
            position: absolute;
            bottom: 14px; right: 16px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            z-index: 2;
        }
        .btn-group {
            display: flex; gap: 8px;
            justify-content: space-between;
        }
        .btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }
        .btn:hover { border-color: var(--accent); }
        
        /* 背诵模式 */
        .recite-list { display: flex; flex-direction: column; gap: 8px; }
        .recite-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            max-height: 200px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .recite-item.expanded {
            max-height: 800px;
        }
        .recite-q { font-size: 0.9375rem; font-weight: 600; margin-bottom: 4px; }
        .recite-a {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.7;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, margin-top 0.2s ease;
        }
        .recite-item.expanded .recite-a {
            max-height: 600px;
            margin-top: 8px;
        }
        .recite-a strong { color: var(--accent); }
        
        .footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        
        /* ==================== 拟物化皮肤（iOS 6 风格）==================== */
        body[data-theme="skeu"] {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at 30% 20%, #1a1a2e 0%, #0f0f1a 50%, #000000 100%);
        }
        [data-theme="skeu"] .big-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: visible;
        }
        [data-theme="skeu"] .big-card::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 15%;
            width: 70%;
            height: 40%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(8px);
            pointer-events: none;
            opacity: 0.7;
        }
        [data-theme="skeu"] .big-card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.3);
        }
        /* 桌面倒影 */
        [data-theme="skeu"] .big-card::after,
        [data-theme="skeu"] .subject-card::after,
        [data-theme="skeu"] .mode-card::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 8%;
            width: 84%;
            height: 18px;
            margin-top: -2px;
            background: inherit;
            filter: blur(14px) brightness(0.4);
            opacity: 0.35;
            transform: scaleY(-0.25);
            transform-origin: top;
            pointer-events: none;
            border-radius: 50%;
        }
        [data-theme="skeu"] .card-front,
        [data-theme="skeu"] .card-back {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: visible;
        }

        /* 卡片顶部高光 */
        [data-theme="skeu"] .card-front::before,
        [data-theme="skeu"] .card-back::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 15%;
            width: 70%;
            height: 40%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(8px);
            pointer-events: none;
            opacity: 0.7;
        }
        [data-theme="skeu"] .btn {
            background: rgba(124, 77, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(124, 77, 255, 0.5);
            border-radius: 12px;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        [data-theme="skeu"] .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            border-radius: 12px 12px 0 0;
            pointer-events: none;
        }
        [data-theme="skeu"] .btn:active {
            transform: translateY(2px);
            background: rgba(124, 77, 255, 0.5);
            box-shadow: 0 1px 0 rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.3);
        }
        [data-theme="skeu"] .subject-card {

        }
        [data-theme="skeu"] .stats-float {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(32px) saturate(1.4);

                0 10px 30px rgba(0, 0, 0, 0.3);
        }
        [data-theme="skeu"] .theme-switcher {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }

        /* 拟物化皮肤 - 学习页面布局修复 */
        /* 注意：不设 display，由 .page / .page.active 控制显示隐藏 */
        [data-theme="skeu"] #page-study .page-header {
            display: flex !important;
            align-items: center;
            padding: 12px 0 8px 0;
            opacity: 1;
            position: relative;
            z-index: 1;
        }
        [data-theme="skeu"] #page-study .card-container {
            perspective: 1000px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        /* 卡片内部：让absolute定位的front/back撑开父元素 */
        [data-theme="skeu"] #page-study .card-inner {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
        }
        [data-theme="skeu"] #page-study .card-front,
        [data-theme="skeu"] #page-study .card-back {
            position: absolute;
            width: 100%;
            min-height: 280px;
            max-height: calc(100vh - 300px);
            overflow-y: auto;
            top: 0; left: 0;
        }
        /* 按钮组：紧跟卡片 */
        [data-theme="skeu"] #page-study .btn-group {
            display: flex !important;
            gap: 8px;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            margin-bottom: 8px;
        }
        /* 返回按钮 */
        [data-theme="skeu"] .back-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e8e8ff;
            opacity: 1;
        }
        /* 统计浮窗：强制fixed在底部 */
        .stats-float[data-skeu-fix],
        [data-theme="skeu"] .stats-float {
            position: fixed !important;
            bottom: 70px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 300 !important;
            margin: 0 !important;
            padding: 10px 20px !important;
        }

        /* 拟物化皮肤 - 首页特效 */
        [data-theme="skeu"] .page.home-screen.active {
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        [data-theme="skeu"] .home-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #f6e9a0, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        [data-theme="skeu"] .home-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            margin-bottom: 32px;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 16px;
        }
        [data-theme="skeu"] .big-cards {
            flex-direction: row;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            justify-content: center;
        }
        [data-theme="skeu"] .big-card-icon { display: none; }
        [data-theme="skeu"] .big-card-title {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        [data-theme="skeu"] .big-card-count {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        [data-theme="skeu"] .big-card-count .stat-number {
            font-size: 3.2rem;
            font-weight: 800;
            display: block;
        }
        [data-theme="skeu"] #card-law .big-card-count {
            color: #ff5252;
            text-shadow: 0 0 30px rgba(255, 80, 80, 0.3);
        }
        [data-theme="skeu"] #card-nonlaw .big-card-count {
            color: #448aff;
            text-shadow: 0 0 30px rgba(50, 140, 255, 0.3);
        }
        [data-theme="skeu"] .big-card-count .stat-unit {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            margin-top: 4px;
        }
        [data-theme="skeu"] .footer-badge {
            display: flex;
            justify-content: center;
            gap: 12px;
            align-items: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
            margin-top: 28px;
        }
        [data-theme="skeu"] .footer-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
        }
        [data-theme="skeu"] .footer-badge .dot.red { background: #ff5252; box-shadow: 0 0 12px rgba(255, 80, 80, 0.6); }
        [data-theme="skeu"] .footer-badge .dot.blue { background: #448aff; box-shadow: 0 0 12px rgba(50, 140, 255, 0.6); }
        
        @media (max-width: 360px) {
            .home-title { font-size: 1.5rem; }
            .big-card { padding: 20px 16px; }
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <!-- 拟物化皮肤光晕层 -->
    <div class="glow-container" id="glow-container">
        <div class="glow glow-red"></div>
        <div class="glow glow-blue"></div>
        <div class="glow glow-purple"></div>
    </div>

    <div class="container">
        <!-- 首页 -->
        <div class="page home-screen active" id="page-home">
            <div class="home-title">战公基</div>
            <div class="home-subtitle">公务员考试知识卡片系统</div>
            <div class="big-cards">
                <div class="big-card" id="card-law">
                    <div class="big-card-icon">⚖️</div>
                    <div class="big-card-title">法律</div>
                    <div class="big-card-count" id="law-count">0 个考点</div>
                </div>
                <div class="big-card" id="card-nonlaw">
                    <div class="big-card-icon">📚</div>
                    <div class="big-card-title">非法</div>
                    <div class="big-card-count" id="nonlaw-count">0 个考点</div>
                </div>
            </div>
            <div class="footer-badge">
                <span class="dot red"></span>
                <span class="dot blue"></span>
                <span class="dot"></span>
                <span>✦ 精准覆盖</span>
            </div>
        </div>

        <!-- 学科列表页 -->
        <div class="page" id="page-subjects">
            <div class="page-header">
                <button class="back-btn" id="back-home">←</button>
                <div>
                    <div class="page-title" id="category-title">法律</div>
                    <div class="page-subtitle">选择学科</div>
                </div>
            </div>
            <div class="subject-grid" id="subject-grid"></div>
        </div>

        <!-- 模式选择页 -->
        <div class="page" id="page-modes">
            <div class="page-header">
                <button class="back-btn" id="back-subjects">←</button>
                <div>
                    <div class="page-title" id="subject-title">学科</div>
                    <div class="page-subtitle" id="subject-stat">已掌握 0 / 总 0</div>
                </div>
            </div>
            <div class="mode-grid">
                <div class="mode-card" id="mode-card">
                    <div class="mode-icon">🃏</div>
                    <div class="mode-name">卡片模式</div>
                    <div class="mode-desc">翻转卡片学习</div>
                </div>
                <div class="mode-card" id="mode-recite">
                    <div class="mode-icon">📖</div>
                    <div class="mode-name">背诵模式</div>
                    <div class="mode-desc">分章节背诵</div>
                </div>
                <div class="mode-card" id="mode-random">
                    <div class="mode-icon">🎲</div>
                    <div class="mode-name">随机模式</div>
                    <div class="mode-desc">随机抽题</div>
                </div>
                <div class="mode-card" id="mode-wrong">
                    <div class="mode-icon">❌</div>
                    <div class="mode-name">错题回顾</div>
                    <div class="mode-desc">只显示错题</div>
                </div>
            </div>
        </div>

        <!-- 学习页面 -->
        <div class="page" id="page-study">
            <div class="page-header">
                <button class="back-btn" id="back-modes">←</button>
                <div>
                    <div class="page-title" id="study-title">学习</div>
                    <div class="page-subtitle" id="study-subtitle">1 / 10</div>
                </div>
            </div>
            <div class="card-container">
                <div class="card-wrapper" id="card-wrapper">
                    <div class="card-inner" id="card-inner">
                        <div class="card-front">
                            <div class="card-number" id="card-number">#1</div>
                            <div class="card-question" id="card-question">问题</div>
                        </div>
                        <div class="card-back">
                            <div class="card-answer" id="card-answer">答案</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn" id="btn-prev">← 上一题</button>
                <button class="btn" id="btn-flip">翻转</button>
                <button class="btn" id="btn-next">下一题 →</button>
            </div>
            <div class="btn-group" style="margin-top: 8px;">
                <button class="btn" id="btn-known">✅ 已掌握</button>
                <button class="btn" id="btn-unknown">❌ 标记为错题</button>
            </div>
        </div>

        <!-- 背诵页面 -->
        <div class="page" id="page-recite">
            <div class="page-header">
                <button class="back-btn" id="back-modes2">←</button>
                <div>
                    <div class="page-title" id="recite-title">背诵模式</div>
                    <div class="page-subtitle">点击展开查看答案</div>
                </div>
            </div>
            <div class="recite-list" id="recite-list"></div>
        </div>

        <!-- 统计浮窗 -->
        <div class="stats-float" id="stats-float" style="display:none;">
            <div class="stat-item">
                <div class="stat-value" id="stat-current">1</div>
                <div class="stat-label">当前</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-total">10</div>
                <div class="stat-label">总计</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-known" style="color:var(--success);">0</div>
                <div class="stat-label">已掌握</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-wrong" style="color:var(--danger);">0</div>
                <div class="stat-label">错题</div>
            </div>
        </div>

        <!-- 换肤按钮 -->
        <div class="theme-switcher" id="theme-switcher">
            <div class="theme-btn active" data-theme="default" title="深蓝科技"></div>
            <div class="theme-btn" data-theme="light" title="晴空蓝"></div>
            <div class="theme-btn" data-theme="skeu" title="拟物化"></div>
        </div>

        <div class="footer">
            <div>© 2026 马辰老师出品</div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // ==================== 主题切换 ====================
        (function() {
            const saved = localStorage.getItem('gongji_theme') || 'default';
            if (saved !== 'default') document.body.setAttribute('data-theme', saved);
            document.querySelectorAll('.theme-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.theme === saved);
            });
        })();

        function switchTheme(name) {
            document.body.setAttribute('data-theme', name === 'default' ? '' : name);
            localStorage.setItem('gongji_theme', name);
            document.getElementById('glow-container').style.display = name === 'skeu' ? 'block' : 'none';
            document.querySelectorAll('.theme-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.theme === name);
            });
        }

        // ==================== 页面切换 ====================
        function showPage(id) {
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            document.getElementById(id).classList.add('active');
        }

        // ==================== 全局状态 ====================
        var currentCategory = null;
        var currentSubject = null;
        var currentMode = null;
        var currentCards = [];
        var currentIndex = 0;
        var isFlipped = false;
        var knownSet = new Set();
        var wrongSet = new Set();

        // ==================== 数据存储 ====================
        function getProg() {
            try { return JSON.parse(localStorage.getItem('gongji_progress') || '{}'); }
            catch(e) { return {}; }
        }

        function saveProg() {
            var p = getProg();
            knownSet.forEach(function(id) { if (!p[id]) p[id] = {}; p[id].known = true; });
            wrongSet.forEach(function(id) { if (!p[id]) p[id] = {}; p[id].wrong = true; });
            localStorage.setItem('gongji_progress', JSON.stringify(p));
        }

        function getCardProg(id) {
            return getProg()[id] || {};
        }

        // ==================== 获取卡片 ====================
        function getCards(subject) {
            if (!subject || !subject.chapters) return [];
            var cards = [];
            subject.chapters.forEach(function(ch) {
                if (ch.cards) cards = cards.concat(ch.cards);
            });
            return cards;
        }

        // ==================== 更新统计 ====================
        function updateStats() {
            var sf = document.getElementById('stats-float');
            if (!sf) return;
            sf.style.display = 'flex';
            document.getElementById('stat-current').textContent = currentIndex + 1;
            document.getElementById('stat-total').textContent = currentCards.length;
            document.getElementById('stat-known').textContent = knownSet.size;
            document.getElementById('stat-wrong').textContent = wrongSet.size;
        }

        function hideStats() {
            var sf = document.getElementById('stats-float');
            if (sf) sf.style.display = 'none';
        }

        // ==================== 首页计数 ====================
        function updateHome() {
            var law = 0, nonlaw = 0;
            try {
                if (cardData && cardData.law && cardData.law.subjects) {
                    Object.values(cardData.law.subjects).forEach(function(s) { law += getCards(s).length; });
                }
                if (cardData && cardData.nonlaw && cardData.nonlaw.subjects) {
                    Object.values(cardData.nonlaw.subjects).forEach(function(s) { nonlaw += getCards(s).length; });
                }
            } catch(e) {}
            document.getElementById('law-count').innerHTML = '<span class="stat-number">' + law + '</span><span class="stat-unit">考点</span>';
            document.getElementById('nonlaw-count').innerHTML = '<span class="stat-number">' + nonlaw + '</span><span class="stat-unit">考点</span>';
        }

        // ==================== 导航 ====================
        function goHome() {
            hideStats();
            currentCategory = null;
            currentSubject = null;
            currentMode = null;
            updateHome();
            showPage('page-home');
        }

        function goToCategory(cat) {
            currentCategory = cat;
            var data = cardData[cat];
            if (!data) return;
            document.getElementById('category-title').textContent = data.name || cat;
            var grid = document.getElementById('subject-grid');
            grid.innerHTML = '';
            if (data.subjects) {
                Object.entries(data.subjects).forEach(function(entry) {
                    var key = entry[0], subject = entry[1];
                    var cards = getCards(subject);
                    var div = document.createElement('div');
                    div.className = 'subject-card';
                    div.innerHTML = '<div class="subject-name">' + (subject.name || key) + '</div>'
                        + '<div class="subject-count">' + (subject.chapters ? subject.chapters.length : 0) + ' 章 · ' + cards.length + ' 张</div>';
                    div.onclick = function() { goToSubject(key); };
                    grid.appendChild(div);
                });
            }
            showPage('page-subjects');
        }

        function goToSubject(key) {
            currentSubject = key;
            var subject = cardData[currentCategory].subjects[key];
            if (!subject) return;
            document.getElementById('subject-title').textContent = subject.name || key;
            var cards = getCards(subject);
            var known = 0;
            cards.forEach(function(c) { if (getCardProg(c.id).known) known++; });
            document.getElementById('subject-stat').textContent = '已掌握 ' + known + ' / 总 ' + cards.length;
            showPage('page-modes');
        }

        function goBackSubjects() {
            hideStats();
            if (currentCategory) goToCategory(currentCategory);
            else goHome();
        }

        function goBackModes() {
            hideStats();
            if (currentSubject) goToSubject(currentSubject);
            else if (currentCategory) goToCategory(currentCategory);
            else goHome();
        }

        // ==================== 学习模式 ====================
        function startMode(mode) {
            currentMode = mode;
            var subject = cardData[currentCategory].subjects[currentSubject];
            if (!subject) return;
            var cards = getCards(subject);

            if (mode === 'random') {
                cards.sort(function() { return Math.random() - 0.5; });
            } else if (mode === 'wrong') {
                cards = cards.filter(function(c) { return getCardProg(c.id).wrong; });
                if (cards.length === 0) { alert('暂无错题！'); return; }
            }

            currentCards = cards;
            currentIndex = 0;
            isFlipped = false;
            knownSet = new Set();
            wrongSet = new Set();
            cards.forEach(function(c) {
                var p = getCardProg(c.id);
                if (p.known) knownSet.add(c.id);
                if (p.wrong) wrongSet.add(c.id);
            });

            if (mode === 'recite') {
                renderRecite();
                showPage('page-recite');
            } else {
                renderCard();
                updateStats();
                showPage('page-study');
            }
        }

        // ==================== 卡片渲染 ====================
        function renderCard() {
            if (currentCards.length === 0) return;
            var card = currentCards[currentIndex];
            if (!card) return;
            document.getElementById('study-title').textContent = (cardData[currentCategory].subjects[currentSubject] || {}).name || '';
            document.getElementById('study-subtitle').textContent = (currentIndex + 1) + ' / ' + currentCards.length;
            
            // 正面：只放问题文字（标签/难度点独立于卡片容器）
            var questionEl = document.getElementById('card-question');
            questionEl.innerHTML = card.question || '';
            questionEl.style.position = '';

            // 清理旧标签/难度点
            var frontEl = questionEl.closest('.card-front') || document.querySelector('.card-front');
            var oldTag = frontEl.querySelector('.card-tag');
            if (oldTag) oldTag.remove();
            var oldDiff = frontEl.querySelector('.card-difficulty');
            if (oldDiff) oldDiff.remove();

            // 右下角难度点
            if (card.difficulty > 0) {
                var diff = document.createElement('div');
                diff.className = 'card-difficulty';
                diff.textContent = '●'.repeat(card.difficulty);
                frontEl.appendChild(diff);
            }
            
            // 背面：答案 + 解析 + 拓展
            var answerHtml = '';
            if (card.analysis) {
                answerHtml += '<div class="analysis-section"><div class="section-label"><span class="info-icon">i</span>解析</div>' + card.analysis + '</div>';
            }
            if (card.expansion) {
                answerHtml += '<div class="expansion-section"><div class="section-label">【拓展】</div>' + card.expansion + '</div>';
            }
            // 答案在最上面
            answerHtml = (card.answer || '') + answerHtml;
            document.getElementById('card-answer').innerHTML = answerHtml;
            
            // 卡号移到底部左侧
            document.getElementById('card-number').textContent = '#' + (currentIndex + 1);
            document.getElementById('card-number').style.left = '16px';
            document.getElementById('card-number').style.bottom = '12px';
            document.getElementById('card-number').style.top = 'auto';
            
            document.getElementById('card-inner').classList.remove('flipped');
            isFlipped = false;
            updateStats();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
        }

        function nextCard() {
            if (currentIndex < currentCards.length - 1) {
                currentIndex++;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            }
        }

        function markKnown() {
            if (currentCards.length === 0) return;
            var card = currentCards[currentIndex];
            if (!card) return;
            knownSet.add(card.id);
            saveProg();
            updateStats();
            if (currentIndex < currentCards.length - 1) setTimeout(nextCard, 300);
        }

        function markUnknown() {
            if (currentCards.length === 0) return;
            var card = currentCards[currentIndex];
            if (!card) return;
            wrongSet.add(card.id);
            saveProg();
            updateStats();
            if (currentIndex < currentCards.length - 1) setTimeout(nextCard, 300);
        }

        // ==================== 背诵模式 ====================
        function renderRecite() {
            var subject = cardData[currentCategory].subjects[currentSubject];
            if (!subject) return;
            document.getElementById('recite-title').textContent = (subject.name || '') + ' - 背诵模式';
            var list = document.getElementById('recite-list');
            list.innerHTML = '';
            if (subject.chapters) {
                subject.chapters.forEach(function(ch) {
                    if (!ch.cards) return;
                    ch.cards.forEach(function(card) {
                        var div = document.createElement('div');
                        div.className = 'recite-item';
                        // 正面显示问题 + 标签
                        var tagHtml = '';
                        var qHtml = '<div class="recite-q">' + (card.question || '') + tagHtml + '</div>';
                        // 背面显示答案 + 解析 + 拓展
                        var aHtml = '<div class="recite-a">' + (card.answer || '');
                        if (card.analysis) aHtml += '<div style="margin-top:8px;padding:12px;background:rgba(124,77,255,0.08);border-left:3px solid rgba(124,77,255,0.4);border-radius:0 8px 8px 0;"><strong style="color:#7c4dff;">💡 解析</strong><br>' + card.analysis + '</div>';
                        if (card.expansion) aHtml += '<div style="margin-top:6px;"><strong>【拓展】</strong>' + card.expansion + '</div>';
                        aHtml += '</div>';
                        div.innerHTML = qHtml + aHtml;
                        div.onclick = function() { div.classList.toggle('expanded'); };
                        list.appendChild(div);
                    });
                });
            }
        }

        // ==================== 绑定事件 ====================
        function bindEvents() {
            document.getElementById('card-law').onclick = function(e) { e.preventDefault(); goToCategory('law'); };
            document.getElementById('card-nonlaw').onclick = function(e) { e.preventDefault(); goToCategory('nonlaw'); };

            document.getElementById('back-home').onclick = goHome;
            document.getElementById('back-subjects').onclick = goBackSubjects;
            document.getElementById('back-modes').onclick = goBackModes;
            document.getElementById('back-modes2').onclick = goBackModes;

            document.getElementById('mode-card').onclick = function() { startMode('card'); };
            document.getElementById('mode-recite').onclick = function() { startMode('recite'); };
            document.getElementById('mode-random').onclick = function() { startMode('random'); };
            document.getElementById('mode-wrong').onclick = function() { startMode('wrong'); };

            document.getElementById('btn-flip').onclick = flipCard;
            document.getElementById('btn-prev').onclick = prevCard;
            document.getElementById('btn-next').onclick = nextCard;
            document.getElementById('btn-known').onclick = markKnown;
            document.getElementById('btn-unknown').onclick = markUnknown;

            document.getElementById('card-wrapper').onclick = function(e) {
                if (e.target.closest('.bookmark-btn')) return;
                flipCard();
            };

            document.querySelectorAll('.theme-btn').forEach(function(b) {
                b.onclick = function() { switchTheme(this.dataset.theme); };
            });
        }

        // ==================== 粒子背景 ====================
        function initParticles() {
            var canvas = document.getElementById('particles');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            if (!ctx) return;

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            var colors = [
                {r:255,g:255,b:255}, {r:255,g:255,b:255}, {r:255,g:255,b:255}
            ];

            var particles = [];
            for (var i = 0; i < 30; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + Math.random() * 100,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: -(Math.random() * 0.8 + 0.2),
                    r: Math.random() * 2 + 1,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }

            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(function(p) {
                    p.x += p.vx; p.y += p.vy;
                    if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(' + p.color.r + ',' + p.color.g + ',' + p.color.b + ',0.6)';
                    ctx.fill();
                });
            }
            animate();
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            updateHome();
            bindEvents();
            initParticles();
            // 初始化光晕层显示状态
            var savedTheme = localStorage.getItem('gongji_theme') || 'default';
            document.getElementById('glow-container').style.display = savedTheme === 'skeu' ? 'block' : 'none';
        });
    </script>
</body>
</html>
